name: Lint

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run code lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5
          install-mode: goinstall
      - name: Run tests lint
        run: |
          make lint-tests
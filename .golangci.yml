version: "2"

linters:
  default: all
  disable:
    - wsl
  settings:
    varnamelen:
      max-distance: 12
    ireturn:
      allow:
        - generic
        - error
    lll:
      line-length: 140
    nlreturn:
      block-size: 2
    depguard:
      rules:
        main:
          files:
            - "$all"
            - "$test"
          allow:
            - "$gostd"
            - "github.com/SharkByteSoftware/go-snk"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false

output:
  sort-order:
    - linter
    - severity
    - file

  show-stats: true

run:
  timeout: 30s
  tests: false
  allow-parallel-runners: true
